name: NVPNode
options:
  bundleIdPrefix: com.nvp
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1" # iPhone
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Manual

packages:
  mlx-swift-lm:
    url: https://github.com/ml-explore/mlx-swift-lm
    exactVersion: "2.30.6"
  mlx-swift:
    url: https://github.com/ml-explore/mlx-swift
    from: "0.30.3"
  gemma4-swift-core:
    url: https://github.com/yejingyang8963-byte/Swift-gemma4-core.git
    from: "0.1.0"

targets:
  NVPNode:
    type: application
    platform: iOS
    sources:
      - path: NVPNode
    dependencies:
      - package: mlx-swift-lm
        product: MLXLLM
      - package: mlx-swift-lm
        product: MLXLMCommon
      - package: mlx-swift
        product: MLX
      - package: gemma4-swift-core
        product: Gemma4SwiftCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nvp.node
        CODE_SIGN_ENTITLEMENTS: NVPNode/NVPNode.entitlements
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: NVP Node
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
      # The coordinator should be served over HTTPS (e.g. Vercel); iOS ATS
      # permits that by default and also allows http://localhost for dev.

schemes:
  NVPNode:
    build:
      targets:
        NVPNode: all
    run:
      config: Debug
    archive:
      config: Release
